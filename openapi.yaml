openapi: 3.1.0
info:
  title: Smart Campus AI Vision Contract
  version: 1.0.0
  description: |
    Hợp đồng API cho Lab 02 giữa Core Business và AI Vision.
    Dịch vụ AI Vision cung cấp face-match và detection result cho hệ thống quản lý campus.
  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: API phân tích khuôn mặt và detection result
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service AI Vision còn hoạt động.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: '2026-05-10T08:00:00Z'

  /vision/face-match:
    post:
      operationId: createFaceMatch
      summary: Gửi yêu cầu face-match tới AI Vision
      description: Consumer Core Business gửi ảnh hoặc face embedding để yêu cầu AI Vision trả kết quả face-match.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceMatchRequest'
            examples:
              imageReference:
                value:
                  requestId: 3542ea6f-8cd4-4f16-9a8e-12b72e9f7a99
                  traceId: trace-20260519-01
                  requestedAt: '2026-05-19T08:00:00Z'
                  matchThreshold: 0.80
                  input:
                    inputType: IMAGE_REF
                    imageRef: https://storage.campus.local/images/entry-1234.jpg
              embeddingRequest:
                value:
                  requestId: 5c7a1d2e-f0b4-4817-b0ad-8f22386d5204
                  traceId: trace-20260519-02
                  requestedAt: '2026-05-19T08:01:00Z'
                  matchThreshold: 0.75
                  input:
                    inputType: FACE_EMBEDDING
                    embeddingVector: [0.12, -0.04, 0.88, 0.66, 0.34]
      responses:
        '200':
          description: Kết quả face-match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceMatchResponse'
              examples:
                matched:
                  value:
                    requestId: 3542ea6f-8cd4-4f16-9a8e-12b72e9f7a99
                    detectionId: 8dd344a4-66c3-4c2b-bc07-a4337f8d2bbb
                    matchStatus: MATCH
                    matchedPersonId: PERSON-2026-007
                    confidence: 0.92
                    modelVersion: v1.3.0
                    detail: 'Khớp khuôn mặt cao.'
                    processedAt: '2026-05-19T08:00:01Z'
                    traceId: trace-20260519-01
                lowConfidence:
                  value:
                    requestId: 5c7a1d2e-f0b4-4817-b0ad-8f22386d5204
                    detectionId: 8dd344a4-66c3-4c2b-bc07-a4337f8d2bbc
                    matchStatus: LOW_CONFIDENCE
                    matchedPersonId: null
                    confidence: 0.58
                    modelVersion: v1.3.0
                    detail: 'Độ tin cậy thấp, đề xuất xác minh bằng tay.'
                    processedAt: '2026-05-19T08:01:02Z'
                    traceId: trace-20260519-02
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionResult
      summary: Lấy kết quả face-match theo ID phát hiện
      description: Trả về chi tiết đối tượng đã được AI Vision phân tích.
      tags: [vision]
      parameters:
        - $ref: '#/components/parameters/DetectionId'
      responses:
        '200':
          description: Chi tiết detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/results/recent:
    get:
      operationId: listRecentDetections
      summary: Lấy danh sách face-match gần nhất
      description: Trả về các kết quả gần nhất theo cursor-based pagination.
      tags: [vision]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Danh sách kết quả face-match gần nhất
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionPage'
              examples:
                recentResults:
                  value:
                    items:
                      - requestId: 3542ea6f-8cd4-4f16-9a8e-12b72e9f7a99
                        detectionId: 8dd344a4-66c3-4c2b-bc07-a4337f8d2bbb
                        matchStatus: MATCH
                        matchedPersonId: PERSON-2026-007
                        confidence: 0.92
                        modelVersion: v1.3.0
                        detail: 'Khớp khuôn mặt cao.'
                        processedAt: '2026-05-19T08:00:01Z'
                        traceId: trace-20260519-01
                    nextCursor: null
                    hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của kết quả face-match.
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor dùng để lấy trang tiếp theo.
      schema:
        type: [string, 'null']
        minLength: 1
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: ai-vision-service
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: '2026-05-19T08:00:00Z'

    FaceMatchRequest:
      type: object
      additionalProperties: false
      required: [requestId, traceId, requestedAt, input]
      properties:
        requestId:
          type: string
          format: uuid
          description: UUID của yêu cầu face-match.
          example: 3542ea6f-8cd4-4f16-9a8e-12b72e9f7a99
        traceId:
          type: string
          minLength: 3
          maxLength: 120
          description: Trace ID để đối chiếu và audit.
          example: trace-20260519-01
        requestedAt:
          type: string
          format: date-time
          description: Thời điểm gửi yêu cầu.
          example: '2026-05-19T08:00:00Z'
        matchThreshold:
          type: number
          minimum: 0
          maximum: 1
          description: Ngưỡng confidence để xác định match.
          default: 0.75
          example: 0.8
        input:
          $ref: '#/components/schemas/FaceMatchInput'

    FaceMatchInput:
      oneOf:
        - $ref: '#/components/schemas/ImageReferenceInput'
        - $ref: '#/components/schemas/FaceEmbeddingInput'
      discriminator:
        propertyName: inputType
        mapping:
          IMAGE_REF: '#/components/schemas/ImageReferenceInput'
          FACE_EMBEDDING: '#/components/schemas/FaceEmbeddingInput'

    ImageReferenceInput:
      type: object
      additionalProperties: false
      required: [inputType, imageRef]
      properties:
        inputType:
          type: string
          const: IMAGE_REF
          description: Loại input là đường dẫn ảnh.
          example: IMAGE_REF
        imageRef:
          type: string
          format: uri
          description: URL ảnh dùng cho face-match.
          example: https://storage.campus.local/images/entry-1234.jpg

    FaceEmbeddingInput:
      type: object
      additionalProperties: false
      required: [inputType, embeddingVector]
      properties:
        inputType:
          type: string
          const: FACE_EMBEDDING
          description: Loại input là embedding khuôn mặt.
          example: FACE_EMBEDDING
        embeddingVector:
          type: array
          minItems: 1
          items:
            type: number
            minimum: -1
            maximum: 1
          description: Vector embedding khuôn mặt để so sánh.
          example: [0.12, -0.04, 0.88, 0.66, 0.34]

    FaceMatchResponse:
      type: object
      additionalProperties: false
      required: [requestId, detectionId, matchStatus, confidence, modelVersion, processedAt, traceId]
      properties:
        requestId:
          type: string
          format: uuid
          description: UUID của yêu cầu face-match ban đầu.
        detectionId:
          type: string
          format: uuid
          description: UUID của kết quả face-match.
        matchStatus:
          type: string
          enum: [MATCH, NO_MATCH, LOW_CONFIDENCE]
          description: Trạng thái match.
          example: MATCH
        matchedPersonId:
          type: [string, 'null']
          description: Mã người được nhận diện hoặc null nếu không xác định.
          example: PERSON-2026-007
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy của kết quả match.
          example: 0.92
        modelVersion:
          type: string
          description: Phiên bản model AI Vision.
          example: v1.3.0
        detail:
          type: [string, 'null']
          maxLength: 300
          description: Mô tả chi tiết kết quả hoặc lý do low confidence.
          example: Khớp khuôn mặt cao.
        processedAt:
          type: string
          format: date-time
          description: Thời điểm hệ thống xử lý yêu cầu.
          example: '2026-05-19T08:00:01Z'
        traceId:
          type: string
          minLength: 3
          maxLength: 120
          description: Trace ID đối chiếu log giữa Consumer và Provider.
          example: trace-20260519-01

    DetectionResult:
      type: object
      additionalProperties: false
      required: [requestId, detectionId, matchStatus, confidence, modelVersion, processedAt, traceId]
      properties:
        requestId:
          type: string
          format: uuid
          description: UUID của yêu cầu face-match ban đầu.
        detectionId:
          type: string
          format: uuid
          description: UUID của kết quả face-match.
        matchStatus:
          type: string
          enum: [MATCH, NO_MATCH, LOW_CONFIDENCE]
          description: Trạng thái match.
          example: MATCH
        matchedPersonId:
          type: [string, 'null']
          description: Mã người được nhận diện hoặc null nếu không xác định.
          example: PERSON-2026-007
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy của kết quả match.
          example: 0.92
        modelVersion:
          type: string
          description: Phiên bản model AI Vision.
          example: v1.3.0
        detail:
          type: [string, 'null']
          maxLength: 300
          description: Mô tả chi tiết kết quả hoặc lý do low confidence.
          example: Khớp khuôn mặt cao.
        processedAt:
          type: string
          format: date-time
          description: Thời điểm hệ thống xử lý yêu cầu.
          example: '2026-05-19T08:00:01Z'
        traceId:
          type: string
          minLength: 3
          maxLength: 120
          description: Trace ID đối chiếu log giữa Consumer và Provider.
          example: trace-20260519-01
        reviewedBy:
          type: [string, 'null']
          description: Người kiểm duyệt hoặc null nếu chưa được xét duyệt.
          example: null

    DetectionPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/DetectionResult'
        nextCursor:
          type: [string, 'null']
          description: Cursor trang tiếp theo, null nếu hết dữ liệu.
          example: null
        hasMore:
          type: boolean
          description: Còn dữ liệu ở trang sau hay không.
          example: false

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tiêu đề lỗi ngắn gọn.
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type: [string, 'null']
          maxLength: 500
          description: Mô tả chi tiết lỗi.
          example: Field cardId không đúng định dạng
        instance:
          type: [string, 'null']
          format: uri
          description: URI của request gây lỗi.
          example: https://campus.local/vision/face-match
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: input.imageRef
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: ENUM_MISMATCH
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: inputType phải là IMAGE_REF hoặc FACE_EMBEDDING

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://campus.local/vision/face-match
            errors:
              - field: input.imageRef
                code: REQUIRED_FIELD
                message: imageRef là bắt buộc khi inputType là IMAGE_REF

    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://campus.local/vision/face-match
            errors: []

    Forbidden:
      description: Không có quyền thực hiện thao tác
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: Xung đột nghiệp vụ hoặc trùng requestId
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Payload đúng định dạng nhưng không hợp lệ về nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
