openapi: 3.1.0
info:
  title: Smart Campus — Camera Stream to AI Vision API
  version: 1.0.0
  description: |
    Hợp đồng API giữa Camera Stream (Consumer) và AI Vision (Provider).
    Camera Stream gửi ảnh để AI Vision phát hiện vật thể/người.
  contact:
    name: Pair 01
    email: pair01@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: Nhận dạng hình ảnh bằng AI
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service còn hoạt động.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: "2026-05-14T08:00:00Z"

  /vision/detect:
    post:
      operationId: requestDetection
      summary: Gửi yêu cầu nhận dạng
      description: Camera Stream gửi yêu cầu nhận dạng lên AI Vision. Trả về detectionId.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRequest"
            examples:
              personDetect:
                value:
                  cameraId: CAM-MAIN-01
                  imageUrl: https://storage.campus.local/streams/cam-main-01/frame-12345.jpg
                  timestamp: "2026-05-14T08:01:00Z"
      responses:
        "202":
          description: Yêu cầu đã được tiếp nhận
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionAccepted"
              examples:
                accepted:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    status: PENDING
                    estimatedTimeMs: 1500
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionResult
      summary: Lấy kết quả nhận dạng
      description: Camera Stream lấy kết quả nhận dạng từ AI Vision theo ID.
      tags: [vision]
      parameters:
        - $ref: "#/components/parameters/DetectionId"
      responses:
        "200":
          description: Kết quả nhận dạng
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResult"
              examples:
                personResult:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    targetType: PERSON
                    status: COMPLETED
                    createdAt: "2026-05-14T08:01:00Z"
                    resolvedAt: "2026-05-14T08:01:02Z"
                    confidence: 0.98
                    hasMask: false
                vehicleResult:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                    targetType: VEHICLE
                    status: COMPLETED
                    createdAt: "2026-05-14T08:02:00Z"
                    resolvedAt: null
                    confidence: 0.95
                    licensePlate: 51H-12345
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /vision/models/info:
    get:
      operationId: getModelsInfo
      summary: Lấy thông tin model AI
      description: Thông tin về các model AI đang chạy.
      tags: [vision]
      responses:
        "200":
          description: Danh sách models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfoResponse"
              examples:
                models:
                  value:
                    models:
                      - modelId: YOLOV8-PERSON
                        version: 8.1.0
                        accuracy: 0.95
                      - modelId: LPR-NET
                        version: 2.0.1
                        accuracy: 0.98
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của detection.
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          description: Trạng thái service.
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.

    DetectionRequest:
      type: object
      additionalProperties: false
      required: [cameraId, imageUrl, timestamp]
      properties:
        cameraId:
          type: string
          minLength: 2
          maxLength: 50
          pattern: "^CAM-[A-Z0-9-]+$"
        imageUrl:
          type: string
          format: uri
        timestamp:
          type: string
          format: date-time

    DetectionAccepted:
      type: object
      additionalProperties: false
      required: [detectionId, status, estimatedTimeMs]
      properties:
        detectionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, PROCESSING]
        estimatedTimeMs:
          type: integer
          minimum: 0

    DetectionResult:
      oneOf:
        - $ref: "#/components/schemas/PersonDetectionResult"
        - $ref: "#/components/schemas/VehicleDetectionResult"
      discriminator:
        propertyName: targetType
        mapping:
          PERSON: "#/components/schemas/PersonDetectionResult"
          VEHICLE: "#/components/schemas/VehicleDetectionResult"

    BaseDetectionResult:
      type: object
      required: [detectionId, targetType, status, createdAt]
      properties:
        detectionId:
          type: string
          format: uuid
        targetType:
          type: string
          enum: [PERSON, VEHICLE]
        status:
          type: string
          enum: [COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, "null"]
          format: date-time
        confidence:
          type: number
          minimum: 0
          maximum: 1

    PersonDetectionResult:
      allOf:
        - $ref: "#/components/schemas/BaseDetectionResult"
        - type: object
          required: [targetType, hasMask]
          properties:
            targetType:
              type: string
              const: PERSON
            hasMask:
              type: boolean

    VehicleDetectionResult:
      allOf:
        - $ref: "#/components/schemas/BaseDetectionResult"
        - type: object
          required: [targetType, licensePlate]
          properties:
            targetType:
              type: string
              const: VEHICLE
            licensePlate:
              type: string
              minLength: 5
              maxLength: 15

    ModelInfoResponse:
      type: object
      additionalProperties: false
      required: [models]
      properties:
        models:
          type: array
          minItems: 0
          items:
            type: object
            additionalProperties: false
            required: [modelId, version, accuracy]
            properties:
              modelId:
                type: string
                minLength: 2
                maxLength: 50
              version:
                type: string
                minLength: 1
                maxLength: 20
              accuracy:
                type: number
                minimum: 0
                maximum: 1

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 3
          maxLength: 120
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: [string, "null"]
          maxLength: 500
        instance:
          type: [string, "null"]
          format: uri
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
              code:
                type: string
                minLength: 2
                maxLength: 80
              message:
                type: string
                minLength: 3
                maxLength: 200

  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://campus.local/vision/detect
            errors:
              - field: cameraId
                code: PATTERN_MISMATCH
                message: cameraId không đúng định dạng CAM-

    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://campus.local/vision/detect
            errors: []

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/not-found
            title: Tài nguyên không tồn tại
            status: 404
            detail: Không tìm thấy kết quả nhận dạng với ID đã cung cấp
            instance: https://campus.local/vision/detections/0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
            errors: []

    UnprocessableEntity:
      description: Payload đúng định dạng nhưng không hợp lệ về nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/unprocessable
            title: Không thể xử lý yêu cầu
            status: 422
            detail: Camera ID không tồn tại hoặc đã bị hủy kích hoạt trong hệ thống
            instance: https://campus.local/vision/detect
            errors: []

    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://campus.local/errors/internal
            title: Lỗi hệ thống
            status: 500
            detail: Đã xảy ra lỗi không mong muốn khi kết nối với module xử lý AI
            instance: https://campus.local/vision/detect
            errors: []
